<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Feed Sign Up</title>

    <style>
        * {
            margin: 0;
        }

        body {
            background: rgb(120, 96, 64);
        }

        #formContainer {
            display: grid;
            grid-template-rows: 1fr 1fr 1fr 1fr;
            background: white;
            border: 10px solid darkblue;
            justify-self: center;
            border-radius: 60px;
            height: 800px;
            width: 505px;
            margin-top: 20px;
            
            


        }

        #heading {
            background-image: url(./images/jesus_feeds_5000.jpeg);
            border-radius: 50px 50px 0 0;
            grid-row: 1/2;
            background-size: cover;
            align-content: center;
            justify-items: center;
            color: white;
            text-shadow: 2px 2px black;
            position: relative;
            
        }

        h2 {
            font-size: 30px;
            text-align: center;
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;

        }
        h1 {
            text-align: center;
        }

        #crabs {
            margin-top: 60px;
        }

        #myForm {
            grid-row: 2/4;
            


        }
        #middle {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr 1fr 1fr 1fr;
            gap: 5px;
            margin-top: 10px;

        }


        button {
            margin-left: 20px;
        }

       #middle label {
            grid-column: 1/2;
            margin: 10px;
        }

       #middle input {
            grid-column: 2/3;
            height: 20px;
            margin-right: 10px;
            margin-top: 10px;

        }
        h3 {
            grid-column: 1/3;
            text-align: center;
            margin-top: 10px;
        }

        #mannerism {
            grid-column: 1/3;
            display: grid;
            grid-template-rows: 1fr 1fr 1fr;
            text-align: center;
            gap: 20px;
            margin-top: 10px;
        }

        #bottom {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            margin-top: 50px;
            gap: 1px;
        }

        #ot {
            grid-column: 1/2;
            height: 150px;
            width: 100px;
            border-radius: 0 0 0 18px;
        }
        
        #nt {
            grid-column: 2/3;
            height: 150px;
            width: 100px;
        }
        #bom {
            grid-column: 3/4;
            height: 150px;
            width: 100px;
        }
        #dac {
            grid-column: 4/5;
            height: 150px;
            width: 100px;
        }
        #pogp {
            grid-column: 5/6;
            height: 150px;
            width: 100px;
            border-radius: 0 0 18px 0;

        }

        






        
    </style>
    




</head>

<body>
    <div id="formContainer">
        <div id="heading">
            <button type="button" id="closeBtn">X</button>
            <div id="crabs">
                <h1> Daily Feed </h1>
                <h2> Scripture a day </h2>
            </div>
        </div>
        
        <form id="myForm">
            <div id="middle">
                <h3>Sign Up for Daily Scripture Feed</h3>
                <label for="username">User Name:</label>
                <input type="text" id="username" name="username" required>

                <label for="password">Password:</label>
                <input type="password" id="password" name="password" required>

                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>

                <label>Gender:</label>
                <div id="woops">
                    <input type="radio" id="male" name="gender" value="male" required>
                    <label for="male">Male</label>
                    <input type="radio" id="female" name="gender" value="female" required>
                    <label for="female">Female</label>
                </div>
                <div id="mannerism">
                    <section>
                        <input type="checkbox" id="newsletter" name="newsletter">
                        <label for="newsletter">Subscribe to newsletter</label>
                    </section>

                    <section>
                        <input type="checkbox" id="conditions" name="conditions" required>
                        <label for="conditions">I acknowledge the terms and conditions</label>
                    </section>

                    <section>
                        <button type="submit">Submit</button>
                    </section>
                </div>
    
            </div>
            <div id="bottom">
                <img src="./images/old_testament.webp" id="ot" alt="Picture of old testament">
                <img src="./images/new_testament.webp" id="nt" alt="Picture of new testament">
                <img src="./images/book_of_mormon.webp" id="bom" alt="Picture of Book of Mormon">
                <img src="./images/doctrine_and_covenants.webp" id="dac" alt="Picture of Doctrine and Covenants">
                <img src="./images/pearl_of_great_price.webp" id="pogp" alt="Picture of Pearl of Great Price">
            </div>
        </form>
    </div>

    <div id="output"></div>

    <script>
        // Here is some Javascript to start looking forward to wdd131
        document.getElementById("closeBtn").addEventListener("click", function () {
            document.getElementById("formContainer").style.display = "none";
         });
        const form = document.getElementById('myForm');
        const output = document.getElementById('output');

        form.addEventListener('submit', function (event) {
            event.preventDefault(); // Stop form from actually submitting

            const formData = new FormData(form);
            const entries = [];

            for (const [key, value] of formData.entries()) {
                if (key == "password") {
                    entries.push(`<strong>${key}</strong>: ${value} (you should probably encrypt the password)`);
                } else {
                    entries.push(`<strong>${key}</strong>: ${value}`);
                }
            }

            output.innerHTML = `
            <br>  
            <h3>Here is the data that would be sent to the server:</h3>
            <ul>
                ${entries.map(item => `<li>${item}</li>`).join('')}
            </ul>
            `;
                });
    </script>

</body>

</html>
