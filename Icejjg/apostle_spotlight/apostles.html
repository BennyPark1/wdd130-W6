<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apostles Spotlights</title>
    <style>
body {
    background-color: #E8ECED;
}

#container {
    background-image: url("images/christus.webp");
    width: 1200px;
    height: 850px;
    justify-self: center;
    background-position: center;
    border: 5px solid black;
    border-radius: 50px;
    color: white;
    font-family: arial helvetica;
    text-align: center;
    margin: 50px auto;
}

.firstpresidency {
    border-radius: 50%;
    display: flex;
    justify-self: center;
    gap: 50px;
    align-items: baseline;
    
}

.firstpresidency img {
    width: 120px;
    height: 120px;
}

.firstpresidency img:nth-child(2) {
    width: 150px;
    height: 150px;
}

h1 {
    margin-top: 30px;
    font-size: 50px;
}

h2 {
    margin-top: 25px;
    font-size: 30px;
    font-family: arial helvetica;
}
.quorumofthetwelveapostles {
    display: grid;
    grid-template-columns: repeat(4, 100px);
    justify-content: center;
    align-content: center;
    gap: 50px;
    margin-top: 30px;
}

img {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    border: 5px solid white;
}

body #container img:hover {
    border: 5px solid #E8ECED;
    transform: scale(1.2);
    transition: 0.3s;
}



    </style>
</head>
<body>
    <div id="container">
        <h1>First Presidency</h1>
        <div class="firstpresidency">
            <img id="eyring" src="images/eyring.webp" alt="a picture of eyring">
            <img id="dallin" src="images/oaks.webp" alt="a picture of oaks">
            <img id="christofferson" src="images/christofferson.webp" alt="a picture of christofferson">
        </div>
         <h2>Quorum of the Twelve Apostles</h1>
        <div class="quorumofthetwelveapostles">
            <img id="holland" src="images/holland.webp" alt="a picture of holland">
            <img id="uchtdorf" src="images/uchtdorf.webp" alt="a picture of utchdorf">
            <img id="bednar" src="images/bednar.webp" alt="a picture of bednar">
            <img id="cook" src="images/cook.webp" alt="a picture of cook">
            <img id="anderson" src="images/anderson.webp" alt="a picture of anderson">
            <img id="rasband" src="images/rasband.webp" alt="a picture of rasband">
            <img id="stevenson" src="images/stevenson.webp" alt="a picture of stevenson">
            <img id="renlund" src="images/renlund.webp" alt="a picture of renlund">
            <img id="gong" src="images/gong.webp" alt="a picture of gong">
            <img id="soares" src="images/soares.webp" alt="a picture of soares">
            <img id="kearon" src="images/kearon.webp" alt="a picture of kearon">
            <img id="causse" src="images/causse.webp" alt="a picture of causse">
    
            
    </div>
</body>
</html>
